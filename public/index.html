<!DOCTYPE html>
<html>
<head>
  <title>Video Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Realtime Video Chat</h2>

<button onclick="createRoom()">Create Room</button>
<br><br>

<input id="roomInput" placeholder="Enter Room Code">
<button onclick="joinRoom()">Join Room</button>

<p id="roomCodeDisplay"></p>
<p id="errorBox"></p>

<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>

<div>
  <button onclick="toggleMic()">Mic</button>
  <button onclick="toggleCam()">Camera</button>
  <button onclick="endCall()" style="background:red;">End</button>
</div>

<hr>

<div id="chatBox">
  <div id="messages"></div>
  <input id="msgInput" placeholder="Message">
  <button onclick="sendMessage()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
